name: Build NexPad

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set version label
        id: version_label
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") {
            $version = "${{ github.sha }}".Substring(0, 7)
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "VERSION_LABEL=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and package release artifacts
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 -Version $env:VERSION_LABEL

      - name: Build and run NexPadTests
        shell: pwsh
        run: |
          msbuild Windows/NexPad.sln /p:Configuration=Release /p:Platform=x64 /t:NexPadTests /m
          .\release\x64\NexPadTests.exe --gtest_output=xml:test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.version_label.outputs.value }}
          path: test-results.xml

      - name: Verify packaged artifact checksums
        shell: pwsh
        run: |
          .\scripts\verify-release-checksums.ps1

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexPad-${{ steps.version_label.outputs.value }}
          path: |
            artifacts/*.zip
            artifacts/*.sha256

      - name: Publish release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.sha256
          generate_release_notes: true
